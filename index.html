<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MSOMI AI - Academic Co-Pilot</title>
    <!-- PWA integration attributes -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C15B32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=192&q=80" />
  </head>
  <body class="overscroll-y-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service Worker Registrar -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Msomi AI PWA Setup: Active Service Worker found on scope', reg.scope))
            .catch(err => console.error('PWA Setup Error:', err));
        });
      }
    </script>
  </body>
</html>
